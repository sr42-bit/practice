name: Python CI + Security

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v2

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      # 4. Run tests
      - name: Run Tests
        run: |
          python -m unittest discover

      # 5. Install Bandit (security tool)
      - name: Install Bandit
        run: |
          pip install bandit

      # 6. Run security scan
      - name: Run Security Scan
        run: |
          bandit -r .